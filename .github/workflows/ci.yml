name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      account-service: ${{ steps.filter.outputs.account-service }}
      transaction-service: ${{ steps.filter.outputs.transaction-service }}
      ledger-service: ${{ steps.filter.outputs.ledger-service }}
      fx-service: ${{ steps.filter.outputs.fx-service }}
      payroll-service: ${{ steps.filter.outputs.payroll-service }}
      admin-service: ${{ steps.filter.outputs.admin-service }}
    steps:
      - uses: actions/checkout@v4

      # Compares changed file paths to service directories.
      # If any file under services/account-service/** changed,
      # the account-service output is set to 'true'.
      - name: Filter changed services
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            account-service:
              - 'services/account-service/**'
            transaction-service:
              - 'services/transaction-service/**'
            ledger-service:
              - 'services/ledger-service/**'
            fx-service:
              - 'services/fx-service/**'
            payroll-service:
              - 'services/payroll-service/**'
            admin-service:
              - 'services/admin-service/**'

  # ──────────────────────────────────────────────────────────
  # Each service job is identical in structure.
  # It only runs if detect-changes flagged that service.
  # needs: detect-changes ensures detection runs first.
  # ──────────────────────────────────────────────────────────

  account-service:
    name: Account Service
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.account-service == 'true' }}
    defaults:
      run:
        working-directory: services/account-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/account-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t account-service:${{ steps.version.outputs.version }} .
          docker build -t account-service:latest .

  transaction-service:
    name: Transaction Service
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.transaction-service == 'true' }}
    defaults:
      run:
        working-directory: services/transaction-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/transaction-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t transaction-service:${{ steps.version.outputs.version }} .
          docker build -t transaction-service:latest .

  ledger-service:
    name: Ledger Service
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.ledger-service == 'true' }}
    defaults:
      run:
        working-directory: services/ledger-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/ledger-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ledger-service:${{ steps.version.outputs.version }} .
          docker build -t ledger-service:latest .

  fx-service:
    name: FX Service
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.fx-service == 'true' }}
    defaults:
      run:
        working-directory: services/fx-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/fx-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t fx-service:${{ steps.version.outputs.version }} .
          docker build -t fx-service:latest .

  payroll-service:
    name: Payroll Service
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.payroll-service == 'true' }}
    defaults:
      run:
        working-directory: services/payroll-service
