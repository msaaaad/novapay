events {
  worker_connections 1024;
}

http {
  upstream account_service    { server account-service:3001; }
  upstream transaction_service { server transaction-service:3002; }
  upstream ledger_service     { server ledger-service:3003; }
  upstream fx_service         { server fx-service:3004; }
  upstream payroll_service    { server payroll-service:3005; }
  upstream admin_service      { server admin-service:3006; }

  server {
    listen 80;

    location /accounts/ {
      proxy_pass http://account_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Request-ID $request_id;
    }
    location /transactions/ {
      proxy_pass http://transaction_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Request-ID $request_id;
    }
    location /ledger/ {
      proxy_pass http://ledger_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Request-ID $request_id;
    }
    location /fx/ {
      proxy_pass http://fx_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Request-ID $request_id;
    }
    location /payroll/ {
      proxy_pass http://payroll_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Request-ID $request_id;
    }
    location /admin/ {
      proxy_pass http://admin_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Request-ID $request_id;
    }
    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }
  }
}